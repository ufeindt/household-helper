[tools]
python = "3.14"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.dev]
description = "Run the Django development server"
alias = "d"
run = "python manage.py runserver"

[tasks.install]
description = "Install dependencies"
alias = "i"
run = "uv sync"

[tasks.manage]
description = "Django management command"
alias = "m"
run = "python manage.py"
